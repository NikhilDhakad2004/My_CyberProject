<!DOCTYPE html>
<html>
<head>
    <title>Login - System Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            /* Background mein car ki image ka blur effect */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('{{ url_for("static", filename="cars/bugatti.jpg") }}');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: transparent;
            border: 1px solid #00d4ff;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: #00d4ff;">SYSTEM ACCESS</h2>
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="Enter Authorization Code" required>
            <br>
            <button type="submit" class="btn-cyber">LOGIN</button>
        </form>
    </div>

</body>
</html>
